<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1>
            My Profile
        </h1>

        <hr>

        <h4>
            Username:
            {{ user.username }}
        </h4>

        <h4>
            Email:
            {{ user.email }}
        </h4>

        <hr>

        <h4>
            Total Orders:
            {{ orders_count }}
        </h4>

        <h4>
            Total Spent:
            ₹{{ total_spent }}
        </h4>

    </div>

</div>

</body>
</html>
