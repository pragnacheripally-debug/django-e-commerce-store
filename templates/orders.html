<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>My Orders</h1>

    <hr>

    {% for order in orders %}

    <div class="card mb-3">

        <div class="card-body">

            <h4>
                Order #{{ order.id }}
            </h4>

            <h5 class="text-success">
                ₹{{ order.total }}
            </h5>

            <p>
                {{ order.created_at }}
            </p>

        </div>

    </div>

    {% empty %}

    <div class="alert alert-info">
        No Orders Yet
    </div>

    {% endfor %}

</div>

</body>
</html>
