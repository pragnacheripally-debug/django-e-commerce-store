<!DOCTYPE html>
<html>
<head>
    <title>My Wishlist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>My Wishlist ❤️</h1>

    <hr>

    {% for item in items %}

    <div class="card mb-3">

        <div class="card-body">

            <h4>
                {{ item.product.name }}
            </h4>

            <h5 class="text-success">
                ₹{{ item.product.price }}
            </h5>

        </div>

    </div>

    {% empty %}

    <div class="alert alert-info">
        Wishlist is empty.
    </div>

    {% endfor %}

</div>

</body>
</html>
