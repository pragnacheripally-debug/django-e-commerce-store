<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>Sales Dashboard</h1>

    <hr>

    <div class="row">

        <div class="col-md-3">
            <div class="card p-3">
                <h4>Total Products</h4>
                <h2>{{ total_products }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h4>Total Orders</h4>
                <h2>{{ total_orders }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h4>Total Users</h4>
                <h2>{{ total_users }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h4>Revenue</h4>
                <h2>₹{{ total_revenue }}</h2>
            </div>
        </div>

    </div>

</div>

</body>
</html>
